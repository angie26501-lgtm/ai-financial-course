<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馥芸財富學苑</title>

<style>
/* ===== 全域設定 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC','Microsoft JhengHei',sans-serif;
  background: #f5f7f6;
}

/* ===== 密碼頁 ===== */
#passwordGate {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: linear-gradient(135deg,#16392e,#1f5b43,#c8a94b);
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  width: 90%;
  max-width: 420px;
  background: rgba(255,255,255,0.95);
  border-radius: 28px;
  padding: 36px 28px;
  text-align: center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.25);
}

.login-box h1 {
  font-size: 24px;
  color: #16392e;
  margin-bottom: 10px;
}

.login-box p {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #ccc;
  margin-bottom: 12px;
  text-align: center;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg,#1f5b43,#c8a94b);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* ===== 主頁 ===== */
.wrap {
  max-width: 720px;
  margin: 40px auto;
  padding: 20px;
}

.hero {
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  margin-bottom: 20px;
}

.hero-title {
  font-size: 22px;
  margin-bottom: 8px;
}

.nav-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.nav-tab {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  cursor: pointer;
}

.nav-tab.active {
  background: black;
  color: white;
}

.tab-content { display:none; }
.tab-content.active { display:block; }

.seg {
  border: 1px solid #ddd;
  border-radius: 14px;
  margin-bottom: 10px;
  overflow: hidden;
}

.seg-header {
  padding: 12px;
  background: #fff;
  cursor: pointer;
}

.seg-body {
  display:none;
  padding: 12px;
  background:#fafafa;
}

.seg.open .seg-body { display:block; }

</style>
</head>

<body>

<!-- 🔐 密碼頁 -->
<div id="passwordGate">
  <div class="login-box">
    <h1>馥芸財富學苑</h1>
    <p>AI × 財務規劃教案頁面<br>此為專屬顧問教案頁</p>

    <input id="passwordInput" type="password" placeholder="請輸入密碼">
    <button onclick="checkPassword()">進入頁面</button>

    <p id="error" style="color:red;display:none;">密碼錯誤</p>
  </div>
</div>

<!-- 主內容 -->
<div class="wrap">

<div class="hero">
  <div class="hero-title">AI × 財務規劃</div>
  <div>人生決策課</div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="switchTab('t1')">流程</div>
  <div class="nav-tab" onclick="switchTab('t2')">重點</div>
</div>

<div id="t1" class="tab-content active">
  <div class="seg" onclick="toggle(this)">
    <div class="seg-header">破冰暖場</div>
    <div class="seg-body">建立信任感、引導進入狀態</div>
  </div>
</div>

<div id="t2" class="tab-content">
  <div class="seg" onclick="toggle(this)">
    <div class="seg-header">理財 vs 投資</div>
    <div class="seg-body">理財是結構，投資是工具</div>
  </div>
</div>

</div>

<script>
const correctPassword = "ai0506";

function checkPassword(){
  const input = document.getElementById("passwordInput").value;
  if(input === correctPassword){
    document.getElementById("passwordGate").style.display = "none";
  } else {
    document.getElementById("error").style.display = "block";
  }
}

function switchTab(id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
}

function toggle(el){
  el.classList.toggle("open");
}
</script>

</body>
</html>
